name: 🔬 CI - Lint & Build Check

on:
  push:
    branches-ignore:
      - main        # production deploy handles main
  pull_request:
    branches:
      - main
      - develop

jobs:
  ci:
    name: Lint & Build Verification
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Run ESLint
        run: npm run lint

      - name: 🔨 Build check
        run: npm run build
        env:
          NEXTAUTH_SECRET: ci-secret-placeholder-32-chars-min
          NEXTAUTH_URL: http://localhost:3000
          MONGODB_URI: mongodb://localhost:27017/test
          NEXT_PUBLIC_DATABASE_URI: mongodb://localhost:27017/test
          CLOUDINARY_CLOUD_NAME: demo
          CLOUDINARY_API_KEY: test
          CLOUDINARY_API_SECRET: test
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: demo
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_dummy
          STRIPE_SECRET_KEY: sk_test_dummy
          NEXT_PUBLIC_STRIPE_CONNECT_CLIENT_ID: ca_test
          STRIPE_PLATFORM_FEE_PERCENT: "2.5"
          NEXT_PUBLIC_SOCKET_URL: http://localhost:3001
          SOCKET_SERVER_URL: http://localhost:3001
          NEXT_PUBLIC_BASE_URL: http://localhost:3000
          FRONTEND_URL: http://localhost:3000
