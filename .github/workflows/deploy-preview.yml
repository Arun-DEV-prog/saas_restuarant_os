name: 🔍 Deploy Preview

on:
  pull_request:
    branches:
      - main
      - develop

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy-preview:
    name: Deploy PR Preview to Vercel
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write   # needed to post PR comments
      contents: read

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      # ── Node.js ───────────────────────────────────────────────────────────
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Install dependencies ───────────────────────────────────────────────
      - name: 📦 Install dependencies
        run: npm ci

      # ── Lint ──────────────────────────────────────────────────────────────
      - name: 🔍 Run ESLint
        run: npm run lint
        continue-on-error: true   # show lint errors but don't block preview

      # ── Install Vercel CLI ─────────────────────────────────────────────────
      - name: 📡 Install Vercel CLI
        run: npm install --global vercel@latest

      # ── Pull Vercel environment ────────────────────────────────────────────
      - name: ⚙️ Pull Vercel environment info
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      # ── Build via Vercel (produces .vercel/output for --prebuilt) ──────────
      - name: 🔨 Build (vercel build)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      # ── Deploy preview ─────────────────────────────────────────────────────
      - name: 🚀 Deploy Preview to Vercel
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
          echo "✅ Preview deployed to: $url"

      # ── Post preview URL as PR comment ────────────────────────────────────
      - name: 💬 Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.url }}';
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const body = [
              '## 🔍 Preview Deployment Ready!',
              '',
              `| | |`,
              `|---|---|`,
              `| **🔗 Preview URL** | ${previewUrl} |`,
              `| **📦 Commit** | \`${sha}\` |`,
              `| **🌿 Branch** | \`${context.payload.pull_request.head.ref}\` |`,
              `| **👤 Author** | @${context.payload.pull_request.user.login} |`,
              '',
              '*This preview will be updated on every new commit to this PR.*',
            ].join('\n');

            // Find existing bot comment to update instead of creating a new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview Deployment Ready')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
